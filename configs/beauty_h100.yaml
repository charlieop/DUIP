# DUIP — production training schedule on a single Modal H100 (80 GB).
#
# The sibling `games.yaml` is the smoke-test config (1 epoch, 200 train
# sessions, micro_batch=2) for quickly verifying that the pipeline runs
# end-to-end on a 12 GB consumer GPU. THIS file removes those caps and
# scales the batch / candidate / epoch budget up to what an H100 can
# actually digest.
#
# Run it on Modal with:
#   modal run modal_app.py::train --config configs/games_h100.yaml
#   modal run modal_app.py::evaluate --config configs/games_h100.yaml \
#       --checkpoint checkpoints/games_h100/best.pt

seed: 42

paths:
  raw_dir: data/raw-beauty
  processed_dir: data/processed-beauty
  # Separate checkpoint / results / log dirs so a smoke-test run on
  # `games.yaml` never silently overwrites a real run's artifacts.
  checkpoint_dir: checkpoints/beauty_h100
  results_path: results/beauty_h100.json
  log_dir: logs/beauty_h100

data:
  hf_dataset: McAuley-Lab/Amazon-Reviews-2023
  review_config: raw_review_All_Beauty
  meta_config: raw_meta_All_Beauty
  min_session_len: 3
  max_session_len: 20
  min_user_sessions: 1
  min_item_freq: 3
  train_ratio: 0.8
  val_ratio: 0.1

model:
  llm_name: Qwen/Qwen3.5-0.8B
  llm_dtype: bfloat16
  item_embed_dim: 128
  # Set to "transformer" to replace the LSTM with the Transformer encoder.
  encoder_type: lstm
  lstm_hidden_dim: 256
  lstm_num_layers: 2
  lstm_dropout: 0.1
  # Transformer encoder options. Hidden/layers/dropout default to the LSTM
  # values when left null, so changing encoder_type is enough for a swap.
  transformer_hidden_dim: null
  transformer_num_layers: null
  transformer_num_heads: 4
  transformer_ff_dim: null
  transformer_dropout: null
  transformer_max_seq_len: 20
  num_soft_tokens: 8
  warm_start_item_embeddings: true
  freeze_llm: true
  # H100 has 80 GB; activation recompute is a *cost* here, not a
  # benefit. Disable it for ~30-40% higher throughput.
  gradient_checkpointing: false
  max_title_tokens: 24
  # `modal_app.py` ships an image without the standalone flash-attn
  # package; PyTorch SDPA on Hopper dispatches to FlashAttention-2/3
  # internally so we get the same kernel either way. (Qwen3.5's *linear*
  # attention -- the Gated DeltaNet blocks -- runs on the FLA Triton
  # kernel that `modal_app.py` also installs, NOT on this setting.)
  attn_implementation: sdpa
  # Per-step total candidates = micro_batch_size * (1 + num_negatives)
  # = 16 * 16 = 256. chunk=32 means 8 LLM forwards per step. We keep this
  # conservative because Qwen3.5's Gated DeltaNet activation footprint
  # is harder to predict than a pure-attention model. With the 0.8B LM
  # (vs. the 2B this config was originally tuned for) activations are
  # ~5x smaller, so once you've confirmed a few epochs run cleanly on an
  # 80 GB H100, bumping this to 64 / 128 (and `micro_batch_size` to 32)
  # is the easy throughput win.
  cand_chunk_size: 8
  hard_prompt_template: |
    The user has recently interacted with the following games (most recent last): {history}.
    <SOFT_PROMPT>
    Based on this interaction history, the next game the user is most likely to want is:

train:
  # 5 epochs over the full ~half-million-session train split is enough
  # for the LSTM + soft-prompt projector + item embeddings to converge
  # against a frozen 0.8B-param LM (the trainable budget is < 30 M params).
  num_epochs: 3

  # Effective batch = micro_batch_size * grad_accum_steps = 64.
  micro_batch_size: 4
  grad_accum_steps: 4

  # InfoNCE benefits from more in-batch negatives. 15 negatives + 1
  # positive = 16 candidates per session, matching `cand_chunk_size=64`
  # cleanly (4 sessions per chunk).
  num_negatives: 15

  # 5e-4 is the AdamW sweet-spot for our trainable-params count at
  # batch=64 (the smoke test uses 1e-3 at batch=8). Lower it to 3e-4
  # if you see loss explode in the first few hundred steps.
  lr: 5.0e-4
  weight_decay: 1.0e-4

  # ~500 warmup steps over a ~12 k-step epoch is the standard 4% rule,
  # which keeps the cosine decay well-behaved.
  warmup_steps: 500
  cosine_schedule: true
  max_grad_norm: 1.0

  log_every: 100
  eval_every_epochs: 1
  early_stop_patience: 3

  # Modal H100 hosts have plenty of CPU; saturate the input pipeline so
  # the GPU never waits on the dataloader.
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4

  # Use the FULL train split. (Set back to e.g. 200 to reproduce the
  # smoke test on this config.)
  max_train_sessions: null

eval:
  num_negatives: 99
  negative_seed: 12345
  ks: [1, 5, 10]
  # Eval is forward-only and skips activation storage — much larger
  # batches and chunks than training are safe.
  micro_batch_size: 8
  num_workers: 4
  cand_chunk_size: 128
  # Use the FULL val / test splits.
  max_val_sessions: null
  max_test_sessions: null

runtime:
  tf32: true
  cudnn_benchmark: true
  matmul_precision: high

logging:
  wandb:
    enabled: true
    project: duip
    entity: null         # set to your wandb username/team or leave null for default
    run_name: null       # autogenerated from timestamp if null
    mode: online         # offline | online | disabled
  # 50 optimizer steps ~= every ~30-60 seconds at H100 throughput, which
  # is a sane signal-to-noise ratio for a multi-hour run.
  log_every_steps: 50
  jsonl: true
