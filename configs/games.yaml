seed: 42

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  checkpoint_dir: checkpoints/games
  results_path: results/games.json
  log_dir: logs/games

data:
  hf_dataset: McAuley-Lab/Amazon-Reviews-2023
  review_config: raw_review_Video_Games
  meta_config: raw_meta_Video_Games
  min_session_len: 2
  max_session_len: 20
  min_user_sessions: 2
  min_item_freq: 5
  train_ratio: 0.8
  val_ratio: 0.1

model:
  llm_name: Qwen/Qwen3.5-2B
  llm_dtype: bfloat16
  item_embed_dim: 128
  lstm_hidden_dim: 256
  lstm_num_layers: 2
  lstm_dropout: 0.1
  num_soft_tokens: 8
  warm_start_item_embeddings: true
  freeze_llm: true
  # gradient_checkpointing trades compute for activation memory. With
  # the new batched-candidates path it is the single biggest VRAM lever
  # at training time (~5x activation reduction). Keep this true unless
  # you have >=24 GB and want maximum throughput.
  gradient_checkpointing: true
  max_title_tokens: 24
  # flash_attention_2 -> sdpa -> eager fallback chain. Set to "sdpa" or
  # "eager" to disable Flash-Attention-2 explicitly. Set to null/"auto"
  # to let HF pick.
  attn_implementation: flash_attention_2
  # Cap on the number of [B*C] sequences sent through the LLM in one
  # forward. Lower if you OOM, raise (or leave null) if you have spare
  # VRAM. Eval can use a larger value (see eval.cand_chunk_size) since
  # no activations need to be retained for backward.
  cand_chunk_size: 16
  hard_prompt_template: |
    The user has recently interacted with the following games (most recent last): {history}.
    <SOFT_PROMPT>
    Based on this interaction history, the next game the user is most likely to want is:

train:
  num_epochs: 1
  micro_batch_size: 2
  grad_accum_steps: 4
  num_negatives: 7
  lr: 1.0e-3
  weight_decay: 1.0e-4
  warmup_steps: 10
  cosine_schedule: true
  max_grad_norm: 1.0
  log_every: 25
  eval_every_epochs: 1
  early_stop_patience: 3
  # On Windows + small smoke tests the worker-spawn cost can dominate;
  # bump this to 4-8 once you remove max_train_sessions.
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 4
  # Smoke-test cap: drop / set to null to train on the full split.
  max_train_sessions: 200

eval:
  num_negatives: 99
  negative_seed: 12345
  ks: [1, 5]
  micro_batch_size: 1
  num_workers: 0
  # Eval is forward-only -> we can fit a much larger chunk than training.
  cand_chunk_size: 32
  # Smoke-test caps: drop / set to null for full evaluation.
  max_val_sessions: 50
  max_test_sessions: 100

runtime:
  tf32: true
  cudnn_benchmark: true
  matmul_precision: high

logging:
  wandb:
    enabled: true
    project: duip
    entity: null         # set to your wandb username/team or leave null for default
    run_name: null       # autogenerated from timestamp if null
    mode: online         # offline | online | disabled
  log_every_steps: 10
  jsonl: true
